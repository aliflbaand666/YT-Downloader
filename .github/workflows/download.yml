name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube URL"
        required: true

      quality:
        description: "144 / 360 / 720 / 1080 / best / mp3"
        required: true
        default: "720"

      subtitle:
        description: "fa / en / both / none"
        required: true
        default: "none"

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
          sudo apt update
          sudo apt install ffmpeg -y

      - name: Create Download Folder
        run: |
          mkdir -p downloads

      - name: Download Media
        shell: bash
        run: |

          URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SUBTITLE="${{ github.event.inputs.subtitle }}"

          SUBS=""

          if [ "$SUBTITLE" = "fa" ]; then
            SUBS="--write-auto-sub --sub-lang fa"
          fi

          if [ "$SUBTITLE" = "en" ]; then
            SUBS="--write-auto-sub --sub-lang en"
          fi

          if [ "$SUBTITLE" = "both" ]; then
            SUBS="--write-auto-sub --sub-lang fa,en"
          fi

          if [ "$QUALITY" = "mp3" ]; then

            yt-dlp \
              -x \
              --audio-format mp3 \
              $SUBS \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"

          else

            if [ "$QUALITY" = "best" ]; then
              FORMAT="best"
            else
              FORMAT="best[height<=${QUALITY}]"
            fi

            yt-dlp \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              --embed-subs \
              --convert-subs srt \
              $SUBS \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"

          fi

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: downloads/
